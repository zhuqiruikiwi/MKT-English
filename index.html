<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Kiwi English">
<title>Kiwi English</title>
<style>
:root{--bg:#fff;--bg2:#f6f6f6;--bg3:#efefef;--text:#1a1a1a;--text2:#555;--text3:#999;--border:#e8e8e8;--border2:#ccc;--blue:#185FA5;--green:#0F6E56;--red:#A32D2D;--yellow:#FFF0A0;--yellowt:#7A6000;}
@media(prefers-color-scheme:dark){:root{--bg:#1c1c1e;--bg2:#2c2c2e;--bg3:#3a3a3c;--text:#f0f0f0;--text2:#aaa;--text3:#666;--border:#3a3a3c;--border2:#555;}}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'PingFang SC','Microsoft YaHei',sans-serif;background:var(--bg);color:var(--text);max-width:480px;margin:0 auto;min-height:100vh}
.pill{font-size:11px;font-weight:500;padding:3px 9px;border-radius:20px;display:inline-block}
.py{background:var(--yellow);color:var(--yellowt)}
.pb{background:#E6F1FB;color:#185FA5}
.pt{background:#E1F5EE;color:#0F6E56}
.pr{background:#FCEBEB;color:#A32D2D}
.pp{background:#EEEDFE;color:#534AB7}
.pg{background:#EAF3DE;color:#3B6D11}
.pn{background:var(--bg3);color:var(--text2)}
.card{background:var(--bg);border-radius:16px;border:.5px solid var(--border);overflow:hidden}
.pad{padding:1rem 1rem 6rem}
.label{font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--text3)}
.title{font-size:17px;font-weight:500;color:var(--text);margin-top:2px}
.word{font-family:Georgia,'Times New Roman',serif;font-size:28px;color:var(--text);line-height:1.2;margin-bottom:.3rem}
.btn-a{flex:1;padding:11px 0;border-radius:10px;font-size:13px;font-weight:500;border:.5px solid;background:transparent;cursor:pointer;font-family:inherit;color:inherit}
.bk{border-color:#1D9E75;color:#0F6E56}.bu{border-color:#378ADD;color:#185FA5}.bn{border-color:#E24B4A;color:#A32D2D}
.stat{background:var(--bg2);border-radius:10px;padding:.75rem;text-align:center}
.sn{font-size:20px;font-weight:500}.sl{font-size:10px;color:var(--text3);margin-top:1px}
.nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:var(--bg);border-top:.5px solid var(--border);display:flex;z-index:100;padding-bottom:env(safe-area-inset-bottom)}
.ni{flex:1;display:flex;flex-direction:column;align-items:center;padding:10px 0 8px;gap:3px;border:none;background:transparent;cursor:pointer;font-family:inherit}
.nl{font-size:10px;font-weight:500}
.fb{font-size:11px;padding:4px 10px;border-radius:20px;border:.5px solid var(--border2);background:transparent;color:var(--text2);cursor:pointer;font-family:inherit}
.fb.on{background:var(--text);color:var(--bg);border-color:var(--text)}
.pbbar{flex:1;height:5px;background:var(--border);border-radius:3px;overflow:hidden}
.pbfill{height:100%;background:#378ADD;border-radius:3px;transition:width .3s}
.sbtn{background:var(--blue);color:#fff;border:none;border-radius:10px;padding:10px 18px;font-size:13px;font-weight:500;font-family:inherit;cursor:pointer}
.sbtn:disabled{opacity:.4}
.msg{padding:.75rem 1rem;border-radius:12px;font-size:13px;line-height:1.6;margin-bottom:.5rem}
.mu{background:#E6F1FB;color:#0C447C;margin-left:2rem}
.ma{background:var(--bg2);color:var(--text);margin-right:2rem}
.mf{background:#E1F5EE;color:#085041;margin-right:2rem;border-left:3px solid #1D9E75;padding-left:.875rem}

.flip-container{width:100%;margin-bottom:.875rem;perspective:1200px;-webkit-perspective:1200px}
.flip-card{width:100%;position:relative;transform-style:preserve-3d;-webkit-transform-style:preserve-3d;transition:transform .55s cubic-bezier(.4,0,.2,1);-webkit-transition:-webkit-transform .55s cubic-bezier(.4,0,.2,1);cursor:pointer;min-height:200px}
.flip-card.flipped{transform:rotateY(180deg);-webkit-transform:rotateY(180deg)}
.flip-front,.flip-back{position:absolute;width:100%;min-height:200px;backface-visibility:hidden;-webkit-backface-visibility:hidden;border-radius:16px;border:.5px solid var(--border);background:var(--bg);overflow:hidden}
.flip-back{transform:rotateY(180deg);-webkit-transform:rotateY(180deg)}
.flip-spacer{min-height:200px;visibility:hidden}

textarea,input[type=text]{background:var(--bg2);border:.5px solid var(--border2);border-radius:10px;padding:.75rem;font-size:14px;font-family:inherit;color:var(--text);width:100%;resize:none;outline:none}
input[type=text]{padding:10px 14px}
.quiz-opt{border:.5px solid var(--border2);border-radius:10px;padding:12px 14px;font-size:13px;text-align:left;cursor:pointer;font-family:inherit;line-height:1.5;background:var(--bg);color:var(--text);width:100%;display:block;margin-bottom:8px;transition:all .2s}
.task-row{display:flex;align-items:center;gap:12px;padding:1rem;background:var(--bg2);border-radius:12px;margin-bottom:.75rem;cursor:pointer;border:.5px solid var(--border)}
.task-row.done{border-color:#1D9E75;background:#E1F5EE10}
.task-check{width:24px;height:24px;border-radius:50%;border:2px solid var(--border2);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:14px}
.task-row.done .task-check{border-color:#1D9E75;background:#1D9E75;color:#fff}
.task-info{flex:1}
.task-title{font-size:15px;font-weight:500;color:var(--text)}
.task-row.done .task-title{color:var(--text3)}
.task-sub{font-size:12px;color:var(--text3);margin-top:2px}
.task-arrow{font-size:18px;color:var(--text3)}
.task-row.done .task-arrow{display:none}
.settings-row{display:flex;align-items:center;justify-content:space-between;padding:.875rem 1rem;border-bottom:.5px solid var(--border)}
.settings-label{font-size:14px;color:var(--text)}
.settings-val{display:flex;gap:6px}
.settings-btn{font-size:12px;padding:4px 12px;border-radius:20px;border:.5px solid var(--border2);background:transparent;color:var(--text2);cursor:pointer;font-family:inherit}
.settings-btn.on{background:var(--blue);color:#fff;border-color:var(--blue)}
.speak-btn{border:none;background:transparent;cursor:pointer;font-size:15px;padding:0 0 0 6px;vertical-align:middle;color:var(--blue)}
</style>
</head>
<body>
<div id="app"></div>
<nav class="nav" id="nav">
  <button class="ni" data-t="today" onclick="go('today')" style="color:var(--blue)"><span style="font-size:22px">📋</span><span class="nl">今日</span></button>
  <button class="ni" data-t="flash" onclick="go('flash')" style="color:var(--text3)"><span style="font-size:22px">📚</span><span class="nl">闪卡</span></button>
  <button class="ni" data-t="quiz" onclick="go('quiz')" style="color:var(--text3)"><span style="font-size:22px">✏️</span><span class="nl">测验</span></button>
  <button class="ni" data-t="write" onclick="go('write')" style="color:var(--text3)"><span style="font-size:22px">📝</span><span class="nl">造句</span></button>
  <button class="ni" data-t="speak" onclick="go('speak')" style="color:var(--text3)"><span style="font-size:22px">💬</span><span class="nl">对话</span></button>
  <button class="ni" data-t="prog" onclick="go('prog')" style="color:var(--text3)"><span style="font-size:22px">📊</span><span class="nl">进度</span></button>
</nav>

let S={
  tab:"today",
  cards:{},streak:0,lastDate:"",
  // settings
  newPerDay:10,quizCount:10,writeCount:3,
  // today task state
  todayDate:"",taskFlash:false,taskQuiz:false,taskWrite:false,
  // flash
  ff:"all",fi:0,flip:false,
  // quiz
  qq:null,qi:0,qs:null,qsc:0,qdone:false,
  // write
  wi:0,wt:"",wshow:false,wdone:0,
  // speak
  sr:null,sm:[],si:"",sl:false,sqi:0,sshow:false,_si:0,
  // settings panel
  showSettings:false,
};

try{
  const d=JSON.parse(localStorage.getItem("kw5")||"{}");
  S.cards=d.c||{};S.streak=d.s||0;S.lastDate=d.d||"";
  S.newPerDay=d.npd||10;S.quizCount=d.qc||10;S.writeCount=d.wc||3;
  S.todayDate=d.td||"";S.taskFlash=d.tf||false;S.taskQuiz=d.tq||false;S.taskWrite=d.tw||false;
  // reset daily tasks if new day
  const today=new Date().toDateString();
  if(S.todayDate!==today){S.taskFlash=false;S.taskQuiz=false;S.taskWrite=false;S.todayDate=today;}
}catch{}

function sv(){
  try{localStorage.setItem("kw5",JSON.stringify({
    c:S.cards,s:S.streak,d:S.lastDate,
    npd:S.newPerDay,qc:S.quizCount,wc:S.writeCount,
    td:S.todayDate,tf:S.taskFlash,tq:S.taskQuiz,tw:S.taskWrite,
  }));}catch{}
}

function markStreak(){
  const today=new Date().toDateString();
  if(S.lastDate!==today){
    S.streak=S.lastDate===new Date(Date.now()-86400000).toDateString()?S.streak+1:1;
    S.lastDate=today;
  }
}

// ── VOCAB HELPERS ────────────────────────────────────────────────
function getNewWords(){
  const unseen=V.filter(v=>!S.cards[v.id]);
  return unseen.slice(0,S.newPerDay);
}
function getReviewWords(){
  return V.filter(v=>S.cards[v.id]==="u");
}
function getFlashWords(){
  if(S.ff==="all")return V;
  if(S.ff==="review")return V.filter(v=>S.cards[v.id]==="u"||!S.cards[v.id]);
  if(S.ff==="new")return V.filter(v=>!S.cards[v.id]);
  return V.filter(v=>v.c===S.ff||v.t===S.ff);
}
function buildQ(count){
  const pool=[...V].sort(()=>Math.random()-.5).slice(0,count);
  return pool.map(v=>({
    v,opts:[...V.filter(x=>x.id!==v.id).sort(()=>Math.random()-.5).slice(0,3),v].sort(()=>Math.random()-.5),c:v.id
  }));
}

// ── NAV ──────────────────────────────────────────────────────────
function go(t){
  S.tab=t;
  document.querySelectorAll(".ni").forEach(n=>n.style.color=n.dataset.t===t?"var(--blue)":"var(--text3)");
  draw();window.scrollTo(0,0);
}

function p(text,cls){return`<span class="pill ${cls||""}">${text}</span>`;}

// ── SPEAK ────────────────────────────────────────────────────────
function speak(text){
  window.speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(text);
  u.lang="en-GB";u.rate=1.0;u.pitch=1;
  const voices=window.speechSynthesis.getVoices();
  const gb=voices.find(v=>v.lang==="en-GB"&&v.localService)||voices.find(v=>v.lang==="en-GB")||voices.find(v=>v.lang.startsWith("en"));
  if(gb)u.voice=gb;
  window.speechSynthesis.speak(u);
}
function speakEx(btn){speak(btn.getAttribute("data-ex"));}

// ── MARK CARD ────────────────────────────────────────────────────
function mk(id,st){
  S.cards[id]=st;markStreak();sv();S.flip=false;S.fi++;draw();
}

// ── QUIZ ─────────────────────────────────────────────────────────
function drawQuiz(){
  if(!S.qq)S.qq=buildQ(S.quizCount);
  if(S.qdone){
    const sc=S.qsc,total=S.quizCount;
    return`<div class="pad" style="text-align:center;padding-top:3rem">
      <div style="font-size:52px;margin-bottom:.75rem">🎉</div>

      <div style="font-size:14px;color:var(--text2);margin-bottom:1rem">${sc} / ${total} correct</div>
      <div style="font-size:40px;font-weight:500;color:${sc/total>=.8?"var(--green)":sc/total>=.5?"var(--blue)":"var(--red)"};margin-bottom:2rem">${Math.round(sc/total*100)}%</div>
      <div style="display:flex;gap:10px;justify-content:center">
        <button class="sbtn" onclick="S.taskQuiz=true;markStreak();sv();go('today')">✓ 完成，返回今日</button>
        <button onclick="S.qq=buildQ(S.quizCount);S.qi=0;S.qs=null;S.qsc=0;S.qdone=false;draw()" style="padding:10px 18px;border-radius:10px;border:.5px solid var(--border2);background:transparent;color:var(--text2);font-family:inherit;font-size:13px;cursor:pointer">再来一次</button>
      </div>
    </div>`;
  }
  const q=S.qq[S.qi];
  return`<div class="pad">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem">
      <div><div class="label">测验 · ${S.qi+1} / ${S.quizCount}</div></div>
    </div>
    <div style="height:5px;background:var(--border);border-radius:3px;overflow:hidden;margin-bottom:1rem">
      <div style="height:100%;width:${(S.qi/S.quizCount)*100}%;background:#378ADD;border-radius:3px;transition:width .3s"></div>
    </div>
    <div class="card" style="margin-bottom:1rem;padding:1.125rem">
      <div style="font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--text3);margin-bottom:.75rem">这个词是什么意思？</div>
      <div class="word" style="font-size:24px">${q.v.e} <button class="speak-btn" onclick="speak('${q.v.e.replace(/'/g,"\\'")}')">🔊</button></div>
      <div style="display:flex;gap:6px;margin-top:.5rem;flex-wrap:wrap">${p(q.v.t,TC[q.v.t]||"pb")} ${p(CL[q.v.c]||q.v.c,"pb")}</div>
    </div>
    <div style="margin-bottom:1rem">
      ${q.opts.map(o=>{
        let bg="var(--bg)",bc="var(--border2)",fc="var(--text)";
        if(S.qs!==null){if(o.id===q.c){bg="#E1F5EE";bc="#1D9E75";fc="#085041";}else if(o.id===S.qs&&S.qs!==q.c){bg="#FCEBEB";bc="#E24B4A";fc="#791F1F";}}
        return`<button class="quiz-opt" onclick="ansQ('${o.id}')" style="background:${bg};border-color:${bc};color:${fc}">${o.z}</button>`;
      }).join("")}
    </div>
    ${S.qs?`<div style="background:var(--bg2);border-radius:10px;padding:1rem;font-size:13px;color:var(--text2);line-height:1.65;font-style:italic;font-family:Georgia,serif">${q.v.x} <button class="speak-btn" onclick="speakEx(this)" data-ex="${q.v.x.replace(/"/g,'&quot;').replace(/'/g,'&#39;')}">🔊</button></div>`:""}
  </div>`;
}
function ansQ(id){
  if(S.qs!==null)return;
  S.qs=id;const q=S.qq[S.qi];
  if(id===q.c)S.qsc++;
  S.cards[q.v.id]=id===q.c?"k":"u";markStreak();sv();draw();
  setTimeout(()=>{if(S.qi+1>=S.quizCount)S.qdone=true;else{S.qi++;S.qs=null;}draw();},1300);
}

// ── WRITE ─────────────────────────────────────────────────────────
function drawWrite(){
  const p2=WP[S.wi%WP.length];
  return`<div class="pad">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem">
      <div><div class="label">造句 · ${(S.wi%WP.length)+1} / ${WP.length}</div><div class="title">Writing Practice</div></div>
      <button onclick="S.taskWrite=true;markStreak();sv();go('today')" style="font-size:12px;padding:5px 12px;border-radius:20px;background:#E1F5EE;border:none;color:#0F6E56;cursor:pointer;font-family:inherit">✓ 标记完成</button>
    </div>
    <div class="card" style="margin-bottom:1rem;padding:1.125rem">
      <div style="font-size:13px;color:var(--text2);line-height:1.65;margin-bottom:.875rem">用以下词汇写一句英文——${p2.cn}</div>
      <div style="display:flex;gap:6px;flex-wrap:wrap">
        ${p2.w.map(w=>`<span style="background:var(--yellow);color:var(--yellowt);font-size:12px;font-weight:500;padding:3px 10px;border-radius:20px;font-family:Georgia,serif;font-style:italic">${w}</span>`).join("")}
      </div>
    </div>
    <textarea placeholder="Write your sentence in English here..." rows="4" style="margin-bottom:1rem" oninput="S.wt=this.value">${S.wt}</textarea>
    <div style="display:flex;gap:8px;margin-bottom:1rem">
      <button class="sbtn" style="flex:1" onclick="S.wshow=true;draw()" ${!S.wt.trim()?"disabled":""}>查看参考答案</button>
      <button onclick="S.wi++;S.wt='';S.wshow=false;draw()" style="padding:10px 16px;border-radius:10px;border:.5px solid var(--border2);background:transparent;color:var(--text2);font-family:inherit;font-size:13px;cursor:pointer">换一题</button>
    </div>
    ${S.wshow?`
      <div style="background:var(--bg2);border-radius:12px;padding:1rem;margin-bottom:.75rem">
        <div style="font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--text3);margin-bottom:.5rem">参考答案</div>
        <div style="font-size:13px;color:var(--text2);line-height:1.75;font-style:italic;font-family:Georgia,serif">${p2.ref} <button class="speak-btn" onclick="speakEx(this)" data-ex="${p2.ref.replace(/"/g,'&quot;').replace(/'/g,'&#39;')}">🔊</button></div>
      </div>
      <div style="background:#E6F1FB;border-radius:10px;padding:.875rem;font-size:12px;color:#185FA5;line-height:1.6">
        💡 对比你的句子和参考答案：用词是否专业？逻辑是否清晰？可以复制到Claude进一步批改。
      </div>
    `:""}
  </div>`;
}

// ── SPEAK ─────────────────────────────────────────────────────────
function drawSpeak(){
  if(S.sr===null)return`<div class="pad">
    <div style="margin-bottom:1rem"><div class="label">额外练习</div><div class="title">角色扮演对话</div></div>
    <div style="font-size:13px;color:var(--text2);margin-bottom:1.25rem;line-height:1.6">选择场景，用英语练习真实工作沟通。先自己口头作答，再查看参考答案对比。</div>
    <div style="display:flex;flex-direction:column;gap:10px">
      ${SPEAK_SCENES.map((sc,i)=>`<button onclick="S._si=${i};S.sr=sc;S.sqi=0;S.sshow=false;draw()" style="background:var(--bg);border:.5px solid var(--border);border-radius:12px;padding:1rem;text-align:left;cursor:pointer;font-family:inherit">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px">
          <span style="font-size:15px;font-weight:500;color:var(--text)">${sc.l}</span>
          <span class="pill pb" style="font-size:10px">${sc.d}</span>
        </div>
        <div style="font-size:12px;color:var(--text3)">${sc.qa.length} 个练习问题</div>
      </button>`).join("")}
    </div>
  </div>`;

  const sc=S.sr,qa=sc.qa[S.sqi];
  return`<div class="pad">
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:1rem">
      <button onclick="S.sr=null;draw()" style="background:transparent;border:none;cursor:pointer;color:var(--text2);padding:0;font-size:20px">←</button>
      <div><div class="title">${sc.l}</div><div class="label">${sc.d} · ${S.sqi+1}/${sc.qa.length}</div></div>
    </div>
    <div style="height:4px;background:var(--border);border-radius:2px;overflow:hidden;margin-bottom:1rem">
      <div style="height:100%;width:${((S.sqi+1)/sc.qa.length)*100}%;background:#378ADD;border-radius:2px"></div>
    </div>
    <div class="card" style="margin-bottom:1rem;padding:1.125rem">
      <div style="font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--text3);margin-bottom:.625rem">对方问你</div>
      <div style="font-size:15px;color:var(--text);line-height:1.6;font-style:italic;font-family:Georgia,serif">"${qa.q}" <button class="speak-btn" onclick="speakEx(this)" data-ex="${qa.q.replace(/"/g,'&quot;').replace(/'/g,'&#39;')}">🔊</button></div>
    </div>
    <div style="background:var(--bg2);border-radius:12px;padding:1rem;margin-bottom:1rem">
      <div style="font-size:12px;color:var(--text3);line-height:1.6">① 先用英语口头回答，说30-60秒<br>② 点击查看参考答案，对比自己的表达<br>③ 注意用了哪些关键词，哪里可以更专业</div>
    </div>
    ${S.sshow?`
      <div style="background:var(--bg2);border-radius:12px;padding:1rem;margin-bottom:1rem">
        <div style="font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--text3);margin-bottom:.5rem">参考答案</div>
        <div style="font-size:13px;color:var(--text2);line-height:1.75;font-family:Georgia,serif">${qa.a} <button class="speak-btn" onclick="speakEx(this)" data-ex="${qa.a.replace(/"/g,'&quot;').replace(/'/g,'&#39;')}">🔊</button></div>
      </div>
    `:""}
    <div style="display:flex;gap:8px">
      <button class="sbtn" style="flex:1" onclick="S.sshow=!S.sshow;draw()">${S.sshow?"隐藏参考答案":"查看参考答案"}</button>
      ${S.sqi+1<sc.qa.length?
        `<button onclick="S.sqi++;S.sshow=false;draw()" style="padding:10px 16px;border-radius:10px;border:.5px solid var(--border2);background:transparent;color:var(--text2);font-family:inherit;font-size:13px;cursor:pointer">下一题 ›</button>`:
        `<button onclick="S.sr=null;draw()" style="padding:10px 16px;border-radius:10px;border:.5px solid var(--border2);background:transparent;color:var(--text2);font-family:inherit;font-size:13px;cursor:pointer">完成</button>`}
    </div>
  </div>`;
}

// ── PROGRESS ──────────────────────────────────────────────────────
function drawProg(){
  const m=Object.values(S.cards).filter(x=>x==="k").length;
  const rv=Object.values(S.cards).filter(x=>x==="u").length;
  const n=V.filter(v=>!S.cards[v.id]).length;
  const pct=Math.round((m/V.length)*100);
  const bt={};V.forEach(v=>{if(!bt[v.t])bt[v.t]={tot:0,m:0};bt[v.t].tot++;if(S.cards[v.id]==="k")bt[v.t].m++;});
  const catNames={correction:"纠偏词",blank:"空白词",brand:"品牌词",digital:"数字营销",compliance:"合规",fmcg:"消费品",formula:"配方奶粉",crm:"CRM",npd:"NPD",supplier:"供应商",meeting:"职场表达",email:"邮件",connector:"逻辑词",data:"数据表达",number:"数字",preposition:"介词",collocation:"搭配",videocall:"视频会议",aus:"澳洲口语",sea:"东南亚",leadership:"领导力",finance:"财务"};
  return`<div class="pad">
    <div style="margin-bottom:1.25rem"><div class="label">Progress</div><div class="title">学习进度</div></div>
    <div class="card" style="padding:1.25rem;margin-bottom:1rem;text-align:center">
      <div style="font-family:Georgia,serif;font-size:52px;font-weight:500;color:var(--blue);line-height:1">${pct}%</div>
      <div style="font-size:13px;color:var(--text2);margin-top:.5rem">overall mastery · ${m} / ${V.length} words</div>
      <div style="height:6px;background:var(--border);border-radius:3px;overflow:hidden;margin-top:1rem">
        <div style="height:100%;width:${pct}%;background:#378ADD;border-radius:3px;transition:width .5s"></div>
      </div>
    </div>
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:1rem">
      <div class="stat"><div class="sn" style="color:var(--green)">${m}</div><div class="sl">mastered</div></div>
      <div class="stat"><div class="sn" style="color:var(--blue)">${rv}</div><div class="sl">reviewing</div></div>
      <div class="stat"><div class="sn" style="color:var(--red)">${n}</div><div class="sl">to learn</div></div>
    </div>
    ${S.streak>0?`<div style="background:#E6F1FB;border-radius:12px;padding:1rem;display:flex;align-items:center;gap:10px;margin-bottom:1rem">
      <span style="font-size:24px">⭐</span>
      <div><div style="font-size:15px;font-weight:500;color:var(--blue)">${S.streak} 天连续学习</div><div style="font-size:12px;color:#378ADD">Keep it up, Kiwi!</div></div>
    </div>`:""}
    <div style="font-size:13px;font-weight:500;color:var(--text);margin-bottom:.75rem">按类别进度</div>
    <div style="display:flex;flex-direction:column;gap:8px">
      ${Object.entries(bt).sort((a,b)=>b[1].m/b[1].tot-a[1].m/a[1].tot).map(([t,{tot,m:mc}])=>`
        <div style="background:var(--bg2);border-radius:10px;padding:.75rem">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:.5rem">
            <span class="pill ${TC[t]||'pb'}">${catNames[t]||t}</span>
            <span style="font-size:12px;color:var(--text2)">${mc}/${tot}</span>
          </div>
          <div style="height:4px;background:var(--border);border-radius:2px;overflow:hidden">
            <div style="height:100%;width:${Math.round(mc/tot*100)}%;background:#378ADD;border-radius:2px"></div>
          </div>
        </div>`).join("")}
    </div>
  </div>`;
}

// ── DRAW ──────────────────────────────────────────────────────────
function draw(){
  const el=document.getElementById("app");
  if(!el)return;
  if(S.tab==="today")el.innerHTML=drawToday();
  else if(S.tab==="flash")el.innerHTML=drawFlash();
  else if(S.tab==="quiz")el.innerHTML=drawQuiz();
  else if(S.tab==="write")el.innerHTML=drawWrite();
  else if(S.tab==="speak")el.innerHTML=drawSpeak();
  else el.innerHTML=drawProg();
}

draw();
</script>
</body>
</html>
